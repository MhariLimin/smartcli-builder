server:
  port: ${PORT:8080}

smartcli-web:
  history-file: ${SMARTCLI_WEB_HISTORY_FILE:${user.home}/.smartcli-web/history.json}
  max-history: 200
  allowed-origins: ${SMARTCLI_WEB_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

spring:
  application:
    name: smartcli-web-backend

# OpenAPI / Swagger UI gating. Spec at /v3/api-docs stays on so the frontend
# `npm run gen:api` script can fetch the contract; the browsable UI at
# /swagger-ui.html flips to false in production to avoid info-disclosure
# (set SMARTCLI_WEB_SWAGGER_UI=false in the Render env).
springdoc:
  api-docs:
    enabled: ${SMARTCLI_WEB_OPENAPI_ENABLED:true}
  swagger-ui:
    enabled: ${SMARTCLI_WEB_SWAGGER_UI:true}
    path: /swagger-ui.html
